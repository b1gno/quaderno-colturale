<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Attività - Quaderno di Campo</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .prodotto-row {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 4px;
        }
        .prodotti-utilizzati {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">🌾 Quaderno di Campo</h1>
            <ul class="nav-menu">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="campi.html">Campi</a></li>
                <li><a href="coltivazioni.html">Coltivazioni</a></li>
                <li><a href="prodotti.html">Magazzino</a></li>
                <li><a href="attivita.html" class="active">Attività</a></li>
            </ul>
        </div>
    </nav>

    <div class="container main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 style="margin: 0; border: none; padding: 0;">Registro Attività</h2>
            <button class="btn btn-primary" onclick="openAddAttivitaModal()">+ Nuova Attività</button>
        </div>
        
        <div class="section">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Campo</th>
                        <th>Coltivazione</th>
                        <th>Tipo Attività</th>
                        <th>Descrizione</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="table-attivita">
                    <tr>
                        <td colspan="6" class="loading">Caricamento attività...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Nuova Attività -->
    <div id="modal-attivita" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3>Nuova Attività</h3>
                <button class="modal-close" onclick="closeModal('modal-attivita')">&times;</button>
            </div>
            <form id="form-attivita" onsubmit="saveAttivita(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="attivita-data">Data *</label>
                        <input type="date" id="attivita-data" required>
                    </div>

                    <div class="form-group">
                        <label for="attivita-tipo">Tipo Attività</label>
                        <select id="attivita-tipo">
                            <option value="">Seleziona...</option>
                            <option value="Preparazione terreno">Preparazione terreno</option>
                            <option value="Semina">Semina</option>
                            <option value="Trapianto">Trapianto</option>
                            <option value="Concimazione">Concimazione</option>
                            <option value="Trattamento fitosanitario">Trattamento fitosanitario</option>
                            <option value="Diserbo">Diserbo</option>
                            <option value="Irrigazione">Irrigazione</option>
                            <option value="Raccolta">Raccolta</option>
                            <option value="Altro">Altro</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="attivita-campo">Campo *</label>
                        <select id="attivita-campo" required onchange="loadColtivazioniPerCampo()">
                            <option value="">Seleziona campo...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="attivita-coltivazione">Coltivazione</label>
                        <select id="attivita-coltivazione">
                            <option value="">Seleziona prima un campo...</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="attivita-descrizione">Descrizione</label>
                    <textarea id="attivita-descrizione" rows="3" placeholder="Descrivi l'attività svolta..."></textarea>
                </div>

                <!-- Prodotti utilizzati -->
                <div class="prodotti-utilizzati">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h4 style="margin: 0;">Prodotti Utilizzati</h4>
                        <button type="button" class="btn btn-secondary btn-small" onclick="addProdottoRow()">+ Aggiungi Prodotto</button>
                    </div>
                    <div id="prodotti-container">
                        <!-- I prodotti verranno aggiunti qui dinamicamente -->
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('modal-attivita')">Annulla</button>
                    <button type="submit" class="btn btn-primary">💾 Salva e Scarica da Magazzino</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Dettagli Attività -->
    <div id="modal-dettagli" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Dettagli Attività</h3>
                <button class="modal-close" onclick="closeModal('modal-dettagli')">&times;</button>
            </div>
            <div id="dettagli-content">
                <!-- Popolato dinamicamente -->
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let attivita = [];
        let campi = [];
        let coltivazioni = [];
        let prodotti = [];
        let prodottiCounter = 0;

        // Imposta data odierna di default
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('attivita-data').value = today;
            loadData();
        });

        async function loadData() {
            try {
                [attivita, campi, coltivazioni, prodotti] = await Promise.all([
                    apiGet('/attivita'),
                    apiGet('/campi'),
                    apiGet('/coltivazioni'),
                    apiGet('/prodotti')
                ]);
                displayAttivita();
            } catch (error) {
                console.error('Errore:', error);
                showError('Errore nel caricamento dei dati');
            }
        }

        function displayAttivita() {
            const tbody = document.getElementById('table-attivita');
            
            if (attivita.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">Nessuna attività registrata</td></tr>';
                return;
            }

            tbody.innerHTML = attivita.map(a => `
                <tr>
                    <td>${formatDate(a.data)}</td>
                    <td><strong>${a.id_campo?.nome || '-'}</strong></td>
                    <td>${a.id_coltivazione?.tipo_coltura || '-'}</td>
                    <td><span class="badge">${a.tipo_attivita || 'Non specificato'}</span></td>
                    <td>${a.descrizione || '-'}</td>
                    <td class="actions">
                        <button class="btn btn-secondary btn-small" onclick="viewDettagli('${a._id}')">Dettagli</button>
                        <button class="btn btn-danger btn-small" onclick="deleteAttivita('${a._id}')">Elimina</button>
                    </td>
                </tr>
            `).join('');
        }

        function openAddAttivitaModal() {
            document.getElementById('form-attivita').reset();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('attivita-data').value = today;
            
            populateSelect('attivita-campo', campi, '_id', 'nome', 'Seleziona campo...');
            document.getElementById('prodotti-container').innerHTML = '';
            prodottiCounter = 0;
            
            openModal('modal-attivita');
        }

        async function loadColtivazioniPerCampo() {
            const campoId = document.getElementById('attivita-campo').value;
            const select = document.getElementById('attivita-coltivazione');
            
            if (!campoId) {
                select.innerHTML = '<option value="">Seleziona prima un campo...</option>';
                return;
            }

            try {
                const coltivazioni = await apiGet(`/campi/${campoId}/coltivazioni`);
                select.innerHTML = '<option value="">Nessuna coltivazione (opzionale)</option>';
                coltivazioni.forEach(c => {
                    const option = document.createElement('option');
                    option.value = c._id;
                    option.textContent = `${c.tipo_coltura} - ${c.stato}`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Errore:', error);
            }
        }

        function addProdottoRow() {
            const container = document.getElementById('prodotti-container');
            const id = prodottiCounter++;
            
            const row = document.createElement('div');
            row.className = 'prodotto-row';
            row.id = `prodotto-row-${id}`;
            row.innerHTML = `
                <div>
                    <select class="prodotto-select" data-id="${id}" required style="width: 100%; padding: 0.6rem; border: 1px solid #dee2e6; border-radius: 4px;">
                        <option value="">Seleziona prodotto...</option>
                        ${prodotti.map(p => `
                            <option value="${p._id}" data-disponibile="${p.quantita_disponibile}" data-unita="${p.unita_misura}">
                                ${p.nome} (Disponibile: ${formatNumber(p.quantita_disponibile)} ${p.unita_misura})
                            </option>
                        `).join('')}
                    </select>
                </div>
                <div>
                    <input type="number" class="prodotto-quantita" data-id="${id}" placeholder="Quantità" step="0.01" min="0.01" required 
                           style="width: 100%; padding: 0.6rem; border: 1px solid #dee2e6; border-radius: 4px;">
                </div>
                <div>
                    <button type="button" class="btn btn-danger btn-small" onclick="removeProdottoRow('${id}')">Rimuovi</button>
                </div>
            `;
            
            container.appendChild(row);
        }

        function removeProdottoRow(id) {
            document.getElementById(`prodotto-row-${id}`).remove();
        }

        async function saveAttivita(event) {
            event.preventDefault();
            
            // Raccogli prodotti utilizzati
            const prodottiSelects = document.querySelectorAll('.prodotto-select');
            const prodottiQuantita = document.querySelectorAll('.prodotto-quantita');
            
            const prodottiUtilizzati = [];
            for (let i = 0; i < prodottiSelects.length; i++) {
                const id_prodotto = prodottiSelects[i].value;
                const quantita = prodottiQuantita[i].value;
                
                if (id_prodotto && quantita) {
                    const option = prodottiSelects[i].options[prodottiSelects[i].selectedIndex];
                    const disponibile = parseFloat(option.dataset.disponibile);
                    const quantitaNum = parseFloat(quantita);
                    
                    if (quantitaNum > disponibile) {
                        showError(`Quantità insufficiente per "${option.text.split(' (')[0]}". Disponibile: ${disponibile}`);
                        return;
                    }
                    
                    prodottiUtilizzati.push({
                        id_prodotto,
                        quantita_utilizzata: quantitaNum
                    });
                }
            }

            const data = {
                data: document.getElementById('attivita-data').value,
                id_campo: document.getElementById('attivita-campo').value,
                id_coltivazione: document.getElementById('attivita-coltivazione').value || null,
                tipo_attivita: document.getElementById('attivita-tipo').value || null,
                descrizione: document.getElementById('attivita-descrizione').value || null,
                prodotti: prodottiUtilizzati
            };

            try {
                const result = await apiPost('/attivita', data);
                showSuccess(`Attività salvata! ${result.prodotti_scaricati} prodotti scaricati dal magazzino.`);
                closeModal('modal-attivita');
                loadData();
            } catch (error) {
                showError(error.message);
            }
        }

        async function viewDettagli(id) {
            try {
                const attivita = await apiGet(`/attivita/${id}`);
                
                let html = `
                    <p><strong>Data:</strong> ${formatDate(attivita.data)}</p>
                    <p><strong>Campo:</strong> ${attivita.id_campo?.nome || '-'}</p>
                    <p><strong>Coltivazione:</strong> ${attivita.id_coltivazione?.tipo_coltura || 'Non specificata'}</p>
                    <p><strong>Tipo:</strong> ${attivita.tipo_attivita || 'Non specificato'}</p>
                    <p><strong>Descrizione:</strong> ${attivita.descrizione || 'Nessuna descrizione'}</p>
                    <hr>
                    <h4>Prodotti Utilizzati:</h4>
                `;

                if (attivita.prodotti_usati && attivita.prodotti_usati.length > 0) {
                    html += '<table class="data-table"><thead><tr><th>Prodotto</th><th>Quantità</th></tr></thead><tbody>';
                    attivita.prodotti_usati.forEach(p => {
                        html += `<tr><td>${p.id_prodotto?.nome || '-'}</td><td>${formatNumber(p.quantita_utilizzata)} ${p.id_prodotto?.unita_misura || ''}</td></tr>`;
                    });
                    html += '</tbody></table>';
                } else {
                    html += '<p class="text-muted">Nessun prodotto utilizzato</p>';
                }

                document.getElementById('dettagli-content').innerHTML = html;
                openModal('modal-dettagli');
            } catch (error) {
                showError('Errore nel caricamento dei dettagli');
            }
        }

        async function deleteAttivita(id) {
            if (!confirmAction('Eliminare questa attività?\n\nNOTA: I prodotti NON verranno ricaricati automaticamente in magazzino.')) return;

            try {
                await apiDelete(`/attivita/${id}`);
                showSuccess('Attività eliminata');
                loadData();
            } catch (error) {
                showError(error.message);
            }
        }
    </script>
</body>
</html>
