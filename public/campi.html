<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Campi - Quaderno di Campo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">🌾 Quaderno di Campo</h1>
            <ul class="nav-menu">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="campi.html" class="active">Campi</a></li>
                <li><a href="coltivazioni.html">Coltivazioni</a></li>
                <li><a href="prodotti.html">Magazzino</a></li>
                <li><a href="attivita.html">Attività</a></li>
            </ul>
        </div>
    </nav>

    <div class="container main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 style="margin: 0; border: none; padding: 0;">Gestione Campi</h2>
            <button class="btn btn-primary" onclick="openAddCampoModal()">+ Nuovo Campo</button>
        </div>
        
        <div class="section">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Superficie (ha)</th>
                        <th>Tipo Terreno</th>
                        <th>Note</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="table-campi">
                    <tr>
                        <td colspan="5" class="loading">Caricamento campi...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Aggiungi/Modifica Campo -->
    <div id="modal-campo" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Nuovo Campo</h3>
                <button class="modal-close" onclick="closeModal('modal-campo')">&times;</button>
            </div>
            <form id="form-campo" onsubmit="saveCampo(event)">
                <input type="hidden" id="campo-id">
                
                <div class="form-group">
                    <label for="campo-nome">Nome Campo *</label>
                    <input type="text" id="campo-nome" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="campo-superficie">Superficie (ettari)</label>
                        <input type="number" id="campo-superficie" step="0.01" min="0">
                    </div>

                    <div class="form-group">
                        <label for="campo-terreno">Tipo Terreno</label>
                        <select id="campo-terreno">
                            <option value="">Seleziona...</option>
                            <option value="Argilloso">Argilloso</option>
                            <option value="Sabbioso">Sabbioso</option>
                            <option value="Medio impasto">Medio impasto</option>
                            <option value="Limoso">Limoso</option>
                            <option value="Franco">Franco</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="campo-note">Note</label>
                    <textarea id="campo-note" rows="3"></textarea>
                </div>

                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('modal-campo')">Annulla</button>
                    <button type="submit" class="btn btn-primary">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let campi = [];
        let editingId = null;

        // Carica tutti i campi
        async function loadCampi() {
            try {
                campi = await apiGet('/campi');
                displayCampi();
            } catch (error) {
                console.error('Errore caricamento campi:', error);
                document.getElementById('table-campi').innerHTML = 
                    '<tr><td colspan="5" class="text-center text-danger">Errore nel caricamento dei campi</td></tr>';
            }
        }

        // Visualizza campi nella tabella
        function displayCampi() {
            const tbody = document.getElementById('table-campi');
            
            if (campi.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">Nessun campo registrato</td></tr>';
                return;
            }

            tbody.innerHTML = campi.map(campo => `
                <tr>
                    <td><strong>${campo.nome}</strong></td>
                    <td>${campo.superficie ? formatNumber(campo.superficie) : '-'}</td>
                    <td>${campo.tipo_terreno || '-'}</td>
                    <td>${campo.note || '-'}</td>
                    <td class="actions">
                        <button class="btn btn-secondary btn-small" onclick="editCampo('${campo._id}')">Modifica</button>
                        <button class="btn btn-danger btn-small" onclick="deleteCampo('${campo._id}', '${campo.nome}')">Elimina</button>
                    </td>
                </tr>
            `).join('');
        }

        // Apri modal per nuovo campo
        function openAddCampoModal() {
            editingId = null;
            document.getElementById('modal-title').textContent = 'Nuovo Campo';
            document.getElementById('form-campo').reset();
            document.getElementById('campo-id').value = '';
            openModal('modal-campo');
        }

        // Modifica campo esistente
        async function editCampo(id) {
            try {
                const campo = await apiGet(`/campi/${id}`);
                editingId = id;
                
                document.getElementById('modal-title').textContent = 'Modifica Campo';
                document.getElementById('campo-id').value = campo.id;
                document.getElementById('campo-nome').value = campo.nome;
                document.getElementById('campo-superficie').value = campo.superficie || '';
                document.getElementById('campo-terreno').value = campo.tipo_terreno || '';
                document.getElementById('campo-note').value = campo.note || '';
                
                openModal('modal-campo');
            } catch (error) {
                showError('Errore nel caricamento del campo');
            }
        }

        // Salva campo (crea o aggiorna)
        async function saveCampo(event) {
            event.preventDefault();
            
            const data = {
                nome: document.getElementById('campo-nome').value,
                superficie: document.getElementById('campo-superficie').value || null,
                tipo_terreno: document.getElementById('campo-terreno').value || null,
                note: document.getElementById('campo-note').value || null
            };

            try {
                if (editingId) {
                    await apiPut(`/campi/${editingId}`, data);
                    showSuccess('Campo aggiornato con successo');
                } else {
                    await apiPost('/campi', data);
                    showSuccess('Campo creato con successo');
                }
                
                closeModal('modal-campo');
                loadCampi();
            } catch (error) {
                showError(error.message || 'Errore nel salvataggio del campo');
            }
        }

        // Elimina campo
        async function deleteCampo(id, nome) {
            if (!confirmAction(`Sei sicuro di voler eliminare il campo "${nome}"?\n\nATTENZIONE: Verranno eliminate anche tutte le coltivazioni e attività associate.`)) {
                return;
            }

            try {
                await apiDelete(`/campi/${id}`);
                showSuccess('Campo eliminato con successo');
                loadCampi();
            } catch (error) {
                showError(error.message || 'Errore nell\'eliminazione del campo');
            }
        }

        // Carica campi al caricamento pagina
        document.addEventListener('DOMContentLoaded', loadCampi);
    </script>
</body>
</html>
