<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campi - Quaderno di Campo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen font-sans antialiased">
    <nav class="bg-emerald-700 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <h1 class="text-xl font-bold tracking-tight">🌾 Quaderno di Campo</h1>
                <ul class="flex gap-1 items-center">
                    <li><a href="index.html" class="px-3 py-2 rounded-lg text-sm font-medium text-white/80 hover:bg-white/10 transition-colors">Dashboard</a></li>
                    <li><a href="campi.html" class="px-3 py-2 rounded-lg text-sm font-medium bg-white/20">Campi</a></li>
                    <li><a href="coltivazioni.html" class="px-3 py-2 rounded-lg text-sm font-medium text-white/80 hover:bg-white/10 transition-colors">Coltivazioni</a></li>
                    <li><a href="prodotti.html" class="px-3 py-2 rounded-lg text-sm font-medium text-white/80 hover:bg-white/10 transition-colors">Magazzino</a></li>
                    <li><a href="attivita.html" class="px-3 py-2 rounded-lg text-sm font-medium text-white/80 hover:bg-white/10 transition-colors">Attività</a></li>
                    <li><a href="calendario.html" class="px-3 py-2 rounded-lg text-sm font-medium text-white/80 hover:bg-white/10 transition-colors">Calendario</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
            <h2 class="text-2xl font-bold" style="color:var(--primary)">Gestione Campi</h2>
            <div class="flex gap-2">
                <button onclick="exportCSV('table-campi','campi')" class="text-sm font-medium px-3 py-2 rounded-lg transition-colors" style="background:var(--surface);color:var(--text);border:1px solid var(--border)">📥 CSV</button>
                <button onclick="openAddCampoModal()" class="text-white font-medium px-4 py-2 rounded-lg transition-colors shadow-sm" style="background:var(--primary)">+ Nuovo Campo</button>
            </div>
        </div>

        <div class="rounded-xl shadow-sm overflow-hidden" style="background:var(--surface)">
            <div class="p-4 border-b" style="border-color:var(--border)">
                <input id="search-campi" type="text" placeholder="🔍 Cerca campi..." class="w-full sm:w-64 px-3 py-2 rounded-lg text-sm outline-none transition-shadow" style="background:var(--bg);color:var(--text);border:1px solid var(--border);focus:ring:2;focus:ring:var(--primary)">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead><tr style="background:#059669;color:white">
                        <th class="px-4 py-3 text-left font-semibold">Nome</th><th class="px-4 py-3 text-left font-semibold">Superficie (ha)</th>
                        <th class="px-4 py-3 text-left font-semibold">Tipo Terreno</th><th class="px-4 py-3 text-left font-semibold">Note</th>
                        <th class="px-4 py-3 text-left font-semibold">Azioni</th>
                    </tr></thead>
                    <tbody id="table-campi" class="divide-y" style="border-color:var(--border)">
                        <tr><td colspan="5" class="px-4 py-6 text-center italic" style="color:var(--text-secondary)">Caricamento...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal-campo" class="modal">
        <div class="modal-content rounded-xl shadow-2xl p-6" style="background:var(--surface)">
            <div class="flex items-center justify-between mb-6">
                <h3 id="modal-title" class="text-lg font-bold" style="color:var(--text)">Nuovo Campo</h3>
                <button class="text-2xl leading-none transition-colors" style="color:var(--text-secondary)" onclick="closeModal('modal-campo')">&times;</button>
            </div>
            <form id="form-campo" onsubmit="saveCampo(event)">
                <input type="hidden" id="campo-id">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1" style="color:var(--text)">Nome Campo *</label>
                    <input type="text" id="campo-nome" required class="w-full px-3 py-2 rounded-lg outline-none transition-shadow" style="background:var(--bg);color:var(--text);border:1px solid var(--border)">
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium mb-1" style="color:var(--text)">Superficie (ettari)</label>
                        <input type="number" id="campo-superficie" step="0.01" min="0" class="w-full px-3 py-2 rounded-lg outline-none transition-shadow" style="background:var(--bg);color:var(--text);border:1px solid var(--border)">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1" style="color:var(--text)">Tipo Terreno</label>
                        <select id="campo-terreno" class="w-full px-3 py-2 rounded-lg outline-none transition-shadow" style="background:var(--bg);color:var(--text);border:1px solid var(--border)">
                            <option value="">Seleziona...</option>
                            <option value="Argilloso">Argilloso</option><option value="Sabbioso">Sabbioso</option>
                            <option value="Medio impasto">Medio impasto</option><option value="Limoso">Limoso</option><option value="Franco">Franco</option>
                        </select>
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-1" style="color:var(--text)">Note</label>
                    <textarea id="campo-note" rows="3" class="w-full px-3 py-2 rounded-lg outline-none transition-shadow resize-y" style="background:var(--bg);color:var(--text);border:1px solid var(--border)"></textarea>
                </div>
                <div class="flex gap-3 justify-end">
                    <button type="button" class="px-4 py-2 text-sm font-medium rounded-lg transition-colors" style="background:var(--surface-hover);color:var(--text)" onclick="closeModal('modal-campo')">Annulla</button>
                    <button type="submit" class="px-4 py-2 text-sm font-medium text-white rounded-lg transition-colors shadow-sm" style="background:var(--primary)">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let campi = [], editingId = null;
        async function loadCampi() {
            try {
                campi = await apiGet('/campi');
                const tb = document.getElementById('table-campi');
                if (!campi.length) { tb.innerHTML = '<tr><td colspan="5" class="px-4 py-6 text-center italic" style="color:var(--text-secondary)">Nessun campo</td></tr>'; return; }
                tb.innerHTML = campi.map(c => `<tr class="transition-colors" style="hover:background:var(--surface-hover)">
                    <td class="px-4 py-3 font-medium">${c.nome}</td>
                    <td class="px-4 py-3" style="color:var(--text-secondary)">${c.superficie ? formatNumber(c.superficie) : '-'}</td>
                    <td class="px-4 py-3">${c.tipo_terreno ? '<span class="inline-block text-xs font-medium px-2.5 py-1 rounded-full" style="background:' + (window.getComputedStyle(document.body).getPropertyValue('--primary-light') || '#dcfce7') + ';color:var(--primary)">' + c.tipo_terreno + '</span>' : '-'}</td>
                    <td class="px-4 py-3" style="color:var(--text-secondary)">${c.note || '-'}</td>
                    <td class="px-4 py-3"><div class="flex gap-2">
                        <button class="text-sm font-medium hover:underline transition-colors" style="color:var(--primary)" onclick="editCampo('${c._id}')">Modifica</button>
                        <button class="text-sm font-medium hover:underline transition-colors" style="color:var(--danger)" onclick="deleteCampo('${c._id}','${c.nome.replace(/'/g,"\\'")}')">Elimina</button>
                    </div></td>
                </tr>`).join('');
                setupSearch('search-campi', 'table-campi');
            } catch(e) { console.error(e); }
        }
        function openAddCampoModal() { editingId = null; document.getElementById('modal-title').textContent = 'Nuovo Campo'; document.getElementById('form-campo').reset(); openModal('modal-campo'); }
        async function editCampo(id) {
            try {
                const c = await apiGet('/campi/' + id); editingId = id;
                document.getElementById('modal-title').textContent = 'Modifica Campo';
                document.getElementById('campo-id').value = c.id; document.getElementById('campo-nome').value = c.nome;
                document.getElementById('campo-superficie').value = c.superficie || '';
                document.getElementById('campo-terreno').value = c.tipo_terreno || '';
                document.getElementById('campo-note').value = c.note || '';
                openModal('modal-campo');
            } catch(e) { showError('Errore caricamento campo'); }
        }
        async function saveCampo(e) {
            e.preventDefault();
            const d = { nome: document.getElementById('campo-nome').value, superficie: document.getElementById('campo-superficie').value || null, tipo_terreno: document.getElementById('campo-terreno').value || null, note: document.getElementById('campo-note').value || null };
            try {
                if (editingId) { await apiPut('/campi/' + editingId, d); showSuccess('Campo aggiornato'); }
                else { await apiPost('/campi', d); showSuccess('Campo creato'); }
                closeModal('modal-campo'); loadCampi();
            } catch(e) { showError(e.message); }
        }
        async function deleteCampo(id, nome) {
            if (!confirmAction('Eliminare "' + nome + '"? Verranno eliminate anche coltivazioni e attività.')) return;
            try { await apiDelete('/campi/' + id); showSuccess('Eliminato'); loadCampi(); } catch(e) { showError(e.message); }
        }
        document.addEventListener('DOMContentLoaded', loadCampi);
    </script>
</body>
</html>
