<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coltivazioni - Quaderno di Campo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen font-sans antialiased">
    <nav class="bg-emerald-700 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <h1 class="text-xl font-bold tracking-tight">🌾 Quaderno di Campo</h1>
                <ul class="flex gap-1 items-center">
                    <li><a href="index.html" class="px-3 py-2 rounded-lg text-sm font-medium text-white/80 hover:bg-white/10 transition-colors">Dashboard</a></li>
                    <li><a href="campi.html" class="px-3 py-2 rounded-lg text-sm font-medium text-white/80 hover:bg-white/10 transition-colors">Campi</a></li>
                    <li><a href="coltivazioni.html" class="px-3 py-2 rounded-lg text-sm font-medium bg-white/20">Coltivazioni</a></li>
                    <li><a href="prodotti.html" class="px-3 py-2 rounded-lg text-sm font-medium text-white/80 hover:bg-white/10 transition-colors">Magazzino</a></li>
                    <li><a href="attivita.html" class="px-3 py-2 rounded-lg text-sm font-medium text-white/80 hover:bg-white/10 transition-colors">Attività</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
            <h2 class="text-2xl font-bold" style="color:var(--primary)">Gestione Coltivazioni</h2>
            <div class="flex gap-2">
                <button onclick="exportCSV('table-coltivazioni','coltivazioni')" class="text-sm font-medium px-3 py-2 rounded-lg transition-colors" style="background:var(--surface);color:var(--text);border:1px solid var(--border)">📥 CSV</button>
                <button onclick="openAddColtivazioneModal()" class="text-white font-medium px-4 py-2 rounded-lg transition-colors shadow-sm" style="background:var(--primary)">+ Nuova Coltivazione</button>
            </div>
        </div>

        <div class="rounded-xl shadow-sm overflow-hidden" style="background:var(--surface)">
            <div class="p-4 border-b" style="border-color:var(--border)">
                <input id="search-coltivazioni" type="text" placeholder="🔍 Cerca coltivazioni..." class="w-full sm:w-64 px-3 py-2 rounded-lg text-sm outline-none transition-shadow" style="background:var(--bg);color:var(--text);border:1px solid var(--border)">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead><tr style="background:#059669;color:white">
                        <th class="px-4 py-3 text-left font-semibold">Campo</th><th class="px-4 py-3 text-left font-semibold">Tipo Coltura</th>
                        <th class="px-4 py-3 text-left font-semibold">Data Semina</th><th class="px-4 py-3 text-left font-semibold">Periodo</th>
                        <th class="px-4 py-3 text-left font-semibold">Stato</th><th class="px-4 py-3 text-left font-semibold">Azioni</th>
                    </tr></thead>
                    <tbody id="table-coltivazioni" class="divide-y" style="border-color:var(--border)">
                        <tr><td colspan="6" class="px-4 py-6 text-center italic" style="color:var(--text-secondary)">Caricamento...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modal-coltivazione" class="modal">
        <div class="modal-content rounded-xl shadow-2xl p-6" style="background:var(--surface)">
            <div class="flex items-center justify-between mb-6">
                <h3 id="modal-title" class="text-lg font-bold" style="color:var(--text)">Nuova Coltivazione</h3>
                <button class="text-2xl leading-none transition-colors" style="color:var(--text-secondary)" onclick="closeModal('modal-coltivazione')">&times;</button>
            </div>
            <form id="form-coltivazione" onsubmit="saveColtivazione(event)">
                <input type="hidden" id="coltivazione-id">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1" style="color:var(--text)">Campo *</label>
                    <select id="coltivazione-campo" required class="w-full px-3 py-2 rounded-lg outline-none" style="background:var(--bg);color:var(--text);border:1px solid var(--border)"></select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1" style="color:var(--text)">Tipo Coltura *</label>
                    <input type="text" id="coltivazione-tipo" required placeholder="Es: Grano, Mais" class="w-full px-3 py-2 rounded-lg outline-none" style="background:var(--bg);color:var(--text);border:1px solid var(--border)">
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium mb-1" style="color:var(--text)">Data Semina</label>
                        <input type="date" id="coltivazione-data" class="w-full px-3 py-2 rounded-lg outline-none" style="background:var(--bg);color:var(--text);border:1px solid var(--border)">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1" style="color:var(--text)">Periodo</label>
                        <select id="coltivazione-periodo" class="w-full px-3 py-2 rounded-lg outline-none" style="background:var(--bg);color:var(--text);border:1px solid var(--border)">
                            <option value="">Seleziona...</option><option value="Primavera-Estate">Primavera-Estate</option>
                            <option value="Autunno-Inverno">Autunno-Inverno</option><option value="Annuale">Annuale</option>
                        </select>
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-1" style="color:var(--text)">Stato</label>
                    <select id="coltivazione-stato" class="w-full px-3 py-2 rounded-lg outline-none" style="background:var(--bg);color:var(--text);border:1px solid var(--border)">
                        <option>In preparazione</option><option>Seminato</option><option>In crescita</option>
                        <option>In produzione</option><option>In raccolta</option><option>Completato</option>
                    </select>
                </div>
                <div class="flex gap-3 justify-end">
                    <button type="button" class="px-4 py-2 text-sm font-medium rounded-lg transition-colors" style="background:var(--surface-hover);color:var(--text)" onclick="closeModal('modal-coltivazione')">Annulla</button>
                    <button type="submit" class="px-4 py-2 text-sm font-medium text-white rounded-lg transition-colors shadow-sm" style="background:var(--primary)">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let coltivazioni = [], campi = [], editingId = null;
        async function loadData() {
            try {
                [coltivazioni, campi] = await Promise.all([apiGet('/coltivazioni'), apiGet('/campi')]);
                const tb = document.getElementById('table-coltivazioni');
                if (!coltivazioni.length) {
                    tb.innerHTML = '<tr><td colspan="6" class="px-4 py-6 text-center italic" style="color:var(--text-secondary)">Nessuna coltivazione</td></tr>';
                } else {
                    tb.innerHTML = coltivazioni.map(c => `<tr class="transition-colors" style="hover:background:var(--surface-hover)">
                        <td class="px-4 py-3 font-medium">${c.id_campo?.nome || '-'}</td>
                        <td class="px-4 py-3">${c.tipo_coltura}</td>
                        <td class="px-4 py-3" style="color:var(--text-secondary)">${formatDate(c.data_semina)}</td>
                        <td class="px-4 py-3">${c.periodo ? '<span class="inline-block text-xs font-medium px-2.5 py-1 rounded-full" style="background:var(--primary-light);color:var(--primary)">' + c.periodo + '</span>' : '-'}</td>
                        <td class="px-4 py-3"><span class="inline-block text-xs font-medium px-2.5 py-1 rounded-full" style="background:var(--primary-light);color:var(--primary)">${c.stato}</span></td>
                        <td class="px-4 py-3"><div class="flex gap-2">
                            <button class="text-sm font-medium hover:underline" style="color:var(--primary)" onclick="editColtivazione('${c._id}')">Modifica</button>
                            <button class="text-sm font-medium hover:underline" style="color:var(--danger)" onclick="deleteColtivazione('${c._id}','${c.tipo_coltura.replace(/'/g,"\\'")}')">Elimina</button>
                        </div></td>
                    </tr>`).join('');
                }
                populateSelect('coltivazione-campo', campi, '_id', 'nome');
                setupSearch('search-coltivazioni', 'table-coltivazioni');
            } catch(e) { console.error(e); }
        }
        function openAddColtivazioneModal() { editingId = null; document.getElementById('modal-title').textContent = 'Nuova Coltivazione'; document.getElementById('form-coltivazione').reset(); openModal('modal-coltivazione'); }
        async function editColtivazione(id) {
            try {
                const c = await apiGet('/coltivazioni/' + id); editingId = id;
                document.getElementById('modal-title').textContent = 'Modifica Coltivazione';
                document.getElementById('coltivazione-campo').value = c.id_campo; document.getElementById('coltivazione-tipo').value = c.tipo_coltura;
                document.getElementById('coltivazione-data').value = formatDateForInput(c.data_semina);
                document.getElementById('coltivazione-periodo').value = c.periodo || ''; document.getElementById('coltivazione-stato').value = c.stato;
                openModal('modal-coltivazione');
            } catch(e) { showError('Errore caricamento'); }
        }
        async function saveColtivazione(e) {
            e.preventDefault();
            const d = { id_campo: document.getElementById('coltivazione-campo').value, tipo_coltura: document.getElementById('coltivazione-tipo').value, data_semina: document.getElementById('coltivazione-data').value || null, periodo: document.getElementById('coltivazione-periodo').value || null, stato: document.getElementById('coltivazione-stato').value };
            try {
                if (editingId) { await apiPut('/coltivazioni/' + editingId, d); showSuccess('Aggiornata'); }
                else { await apiPost('/coltivazioni', d); showSuccess('Creata'); }
                closeModal('modal-coltivazione'); loadData();
            } catch(e) { showError(e.message); }
        }
        async function deleteColtivazione(id, tipo) { if (!confirmAction('Eliminare "' + tipo + '"?')) return; try { await apiDelete('/coltivazioni/' + id); showSuccess('Eliminata'); loadData(); } catch(e) { showError(e.message); } }
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
